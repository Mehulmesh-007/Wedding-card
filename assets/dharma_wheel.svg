<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#AA771C" />
      <stop offset="20%" stop-color="#FBF5B7" />
      <stop offset="40%" stop-color="#B38728" />
      <stop offset="60%" stop-color="#FCF6BA" />
      <stop offset="80%" stop-color="#BF953F" />
      <stop offset="100%" stop-color="#AA771C" />
    </linearGradient>
    <filter id="gold-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="0.6"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g fill="none" stroke="url(#gold-grad)" filter="url(#gold-glow)">
    <!-- Outer Decorative Rim -->
    <circle cx="100" cy="100" r="85" stroke-width="1.5" stroke-dasharray="3, 3" />
    <circle cx="100" cy="100" r="78" stroke-width="2.5" />
    
    <!-- Inner Rim -->
    <circle cx="100" cy="100" r="62" stroke-width="2" />
    
    <!-- Central Hub -->
    <circle cx="100" cy="100" r="22" stroke-width="3" />
    <circle cx="100" cy="100" r="16" stroke-width="1.5" />
    <circle cx="100" cy="100" r="6" fill="url(#gold-grad)" stroke-width="0" />
    
    <!-- Central Gankyil (Three-spoke swirl inside the hub center) -->
    <path d="M 100,94 A 6,6 0 0,0 94,100 A 3,3 0 0,1 97,97 A 3,3 0 0,1 100,94 Z" fill="url(#gold-grad)" opacity="0.8"/>
    
    <!-- Outer Rim Knobs (Spiritual Protections) -->
    <circle cx="100" cy="15" r="4" fill="url(#gold-grad)" />
    <circle cx="100" cy="185" r="4" fill="url(#gold-grad)" />
    <circle cx="15" cy="100" r="4" fill="url(#gold-grad)" />
    <circle cx="185" cy="100" r="4" fill="url(#gold-grad)" />
    
    <circle cx="40" cy="40" r="3" fill="url(#gold-grad)" />
    <circle cx="160" cy="40" r="3" fill="url(#gold-grad)" />
    <circle cx="40" cy="160" r="3" fill="url(#gold-grad)" />
    <circle cx="160" cy="160" r="3" fill="url(#gold-grad)" />

    <!-- 8 Spokes -->
    <!-- 12 o'clock -->
    <path d="M 100,78 L 100,62 M 100,38 L 100,22" stroke-width="3" stroke-linecap="round" />
    <path d="M 97,62 L 97,38 A 3,3 0 0,1 103,38 L 103,62 Z" stroke-width="1.5" />
    <!-- 6 o'clock -->
    <path d="M 100,122 L 100,138 M 100,162 L 100,178" stroke-width="3" stroke-linecap="round" />
    <path d="M 97,138 L 97,162 A 3,3 0 0,0 103,162 L 103,138 Z" stroke-width="1.5" />
    <!-- 9 o'clock -->
    <path d="M 78,100 L 62,100 M 38,100 L 22,100" stroke-width="3" stroke-linecap="round" />
    <path d="M 62,97 L 38,97 A 3,3 0 0,0 38,103 L 62,103 Z" stroke-width="1.5" />
    <!-- 3 o'clock -->
    <path d="M 122,100 L 138,100 M 162,100 L 178,100" stroke-width="3" stroke-linecap="round" />
    <path d="M 138,97 L 162,97 A 3,3 0 0,1 162,103 L 138,103 Z" stroke-width="1.5" />
    
    <!-- Diagonal Spokes (45, 135, 225, 315 deg) -->
    <!-- Rotate groups for diagonal spokes -->
    <g transform="rotate(45 100 100)">
      <path d="M 100,78 L 100,62 M 100,38 L 100,22" stroke-width="3" stroke-linecap="round" />
      <path d="M 97,62 L 97,38 A 3,3 0 0,1 103,38 L 103,62 Z" stroke-width="1.5" />
      
      <path d="M 100,122 L 100,138 M 100,162 L 100,178" stroke-width="3" stroke-linecap="round" />
      <path d="M 97,138 L 97,162 A 3,3 0 0,0 103,162 L 103,138 Z" stroke-width="1.5" />
    </g>
    <g transform="rotate(135 100 100)">
      <path d="M 100,78 L 100,62 M 100,38 L 100,22" stroke-width="3" stroke-linecap="round" />
      <path d="M 97,62 L 97,38 A 3,3 0 0,1 103,38 L 103,62 Z" stroke-width="1.5" />
      
      <path d="M 100,122 L 100,138 M 100,162 L 100,178" stroke-width="3" stroke-linecap="round" />
      <path d="M 97,138 L 97,162 A 3,3 0 0,0 103,162 L 103,138 Z" stroke-width="1.5" />
    </g>
    
    <!-- Subtle concentric rings to bind the spokes visually -->
    <circle cx="100" cy="100" r="48" stroke-width="1" opacity="0.5" stroke-dasharray="10, 5" />
  </g>
</svg>
