<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#AA771C" />
      <stop offset="20%" stop-color="#FBF5B7" />
      <stop offset="40%" stop-color="#B38728" />
      <stop offset="60%" stop-color="#FCF6BA" />
      <stop offset="80%" stop-color="#BF953F" />
      <stop offset="100%" stop-color="#AA771C" />
    </linearGradient>
    <filter id="gold-glow">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g fill="none" stroke="url(#gold-grad)" stroke-width="1.5" filter="url(#gold-glow)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main outer corner lines -->
    <path d="M 95,5 L 5,5 L 5,95" stroke-width="1.5" />
    <path d="M 90,9 L 9,9 L 9,90" stroke-width="0.75" stroke-opacity="0.6" />
    
    <!-- Central Corner Ornament (Filigree) -->
    <!-- Spiral elements pointing outwards/inwards -->
    <path d="M 9,9 Q 25,25 35,35 Q 25,45 15,45 C 9,45 9,35 18,30 Q 22,28 25,28" stroke-width="1" />
    <path d="M 9,9 Q 25,25 35,35 Q 45,25 45,15 C 45,9 35,9 30,18 Q 28,22 28,25" stroke-width="1" />
    
    <!-- Lotus leaf shape in corner -->
    <path d="M 9,9 C 20,12 30,20 40,40 C 20,30 12,20 9,9 Z" fill="url(#gold-grad)" fill-opacity="0.1" stroke-width="1.2" />
    
    <!-- Tiny accents -->
    <circle cx="50" cy="5" r="2.5" fill="url(#gold-grad)" stroke="none" />
    <circle cx="5" cy="50" r="2.5" fill="url(#gold-grad)" stroke="none" />
    
    <path d="M 9,9 L 16,16" stroke-width="2" />
    <circle cx="20" cy="20" r="2" fill="url(#gold-grad)" stroke="none" />
    <circle cx="30" cy="30" r="1.5" fill="url(#gold-grad)" stroke="none" />
    <circle cx="38" cy="38" r="1" fill="url(#gold-grad)" stroke="none" />
    
    <!-- Decorative brackets on borders -->
    <path d="M 75,3 Q 80,5 85,3" stroke-width="1" />
    <path d="M 3,75 Q 5,80 3,85" stroke-width="1" />
  </g>
</svg>
